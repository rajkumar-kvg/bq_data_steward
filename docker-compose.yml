services:
  db:
    image: postgres:15-alpine
    container_name: bq_steward_db
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: steward
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bq_steward_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://steward:steward@db:5432/steward
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    container_name: bq_steward_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  cube:
    image: cubejs/cube:latest
    container_name: bq_steward_cube
    environment:
      - CUBEJS_DB_TYPE=bigquery
      - CUBEJS_API_SECRET=bq_steward_secret_key
      - CUBEJS_TELEMETRY=false
      - CUBEJS_CACHE_AND_QUEUE_DRIVER=memory
    ports:
      - "4000:4000"
    volumes:
      - ./cube:/cube/conf
    depends_on:
      - backend

volumes:
  pg_data:
